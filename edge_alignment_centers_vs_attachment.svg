  <text x="20" y="160" font-family="sans-serif" font-size="13" fill="#2C2C2A" font-weight="500" style="fill:rgb(44, 44, 42);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:13px;font-weight:500;text-anchor:start;dominant-baseline:auto">Nachher: Edges greifen exakt an Mittelpunkten an → gerade</text>
